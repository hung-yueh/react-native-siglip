buildscript {
  repositories {
    google()
    mavenCentral()
  }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

// Include Nitrogen-generated Gradle setup
apply from: "../nitrogen/generated/android/NitroSigLIP+autolinking.gradle"

android {
  namespace "com.reactnativesiglip"
  compileSdkVersion 34

  defaultConfig {
    minSdkVersion 24
    targetSdkVersion 34
    externalNativeBuild {
      cmake {
        cppFlags "-std=c++20 -fexceptions -frtti"
        arguments "-DANDROID_STL=c++_shared"
      }
    }
    ndk {
      abiFilters "arm64-v8a"
    }
  }

  externalNativeBuild {
    cmake {
      path file("CMakeLists.txt")
    }
  }

  packagingOptions {
    pickFirst "**/libc++_shared.so"
    pickFirst "**/libfbjni.so"
  }

  buildFeatures {
    prefab true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  // Include Nitrogen-generated Kotlin sources
  sourceSets {
    main {
      java.srcDirs += ["../nitrogen/generated/android/kotlin"]
    }
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android:+"
  implementation project(":react-native-nitro-modules")
  // implementation files("libs/executorch.aar")
}
